name: Seed content (one-shot)

# Manually build out the article cluster fast: generate a batch of detail
# articles and/or a pillar, translate each to es-419, refresh the relatedSlugs
# mesh, rebuild /docs, commit, push, and ping IndexNow. Trigger from the
# Actions tab ("Run workflow"). NOT on a schedule — this is a one-shot tool.
on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of detail articles to generate'
        required: false
        default: '10'
      pillar:
        description: 'Also generate a pillar article?'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: daily-content # share the daily group so the two never push concurrently
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Seed content
        id: seed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/seed-content.mjs --count ${{ github.event.inputs.count }} ${{ github.event.inputs.pillar == 'true' && '--pillar' || '' }}

      - name: Detect content changes
        id: changes
        working-directory: .
        run: |
          if ! git diff --quiet -- web/src/content; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + deploy to /docs
        if: steps.changes.outputs.changed == 'true'
        env:
          PUBLIC_ADSENSE_ID: ca-pub-1426577294682977
          PUBLIC_GA4_ID: G-YVKK4MXGVP
          PUBLIC_LEAD_ENDPOINT: https://api.web3forms.com/submit
          PUBLIC_WEB3FORMS_KEY: a60d7acf-608e-455d-b6c0-5266f3b7dc5e
          PUBLIC_ADSENSE_SLOT_ARTICLE_TOP: '7717297356'
          PUBLIC_ADSENSE_SLOT_ARTICLE_END: '3778052348'
          PUBLIC_ADSENSE_SLOT_MONEY_FOOTER: '4109224835'
          PUBLIC_ADSENSE_SLOT_THANKYOU: '1151889001'
        run: bash scripts/deploy-to-docs.sh

      - name: Ping IndexNow
        if: steps.changes.outputs.changed == 'true'
        run: node scripts/indexnow.mjs || true

      - name: Commit & push
        if: steps.changes.outputs.changed == 'true'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs web/src/content
          git commit -m "Seed content batch"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push attempt $i failed (likely a concurrent push) — retrying"
            sleep 5
          done
          echo "::error::Could not push after 5 attempts"
          exit 1
