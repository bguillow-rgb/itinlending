name: IndexNow ping

# After new content ships to /docs (GitHub Pages), submit itinlending.net URLs to
# IndexNow so Bing/Yandex/etc. re-crawl quickly. Google ignores IndexNow, but
# Bing feeds ChatGPT/Copilot, so this matters for answer-engine visibility.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: indexnow
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Ping IndexNow
        # Key is public by design (served at public/4524d82c6a8008289f40cde63aad623f.txt)
        env:
          PUBLIC_INDEXNOW_KEY: 4524d82c6a8008289f40cde63aad623f
        run: node scripts/indexnow.mjs || true
