name: Activate Indexing API (one-off)

# One-off: makes the Indexing API service account a VERIFIED OWNER of the Search
# Console property via the Site Verification API (FILE method), because Google
# removed the delegated-owner "Add an owner" UI for Domain-parent-verified
# properties. Steps: mint a FILE token -> deploy it live -> verify -> confirm the
# Indexing API now returns URL_UPDATED instead of 403. Safe to re-run. Delete once
# the property shows the service account as a verified owner.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  activate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Mint FILE verification token
        id: token
        env:
          GOOGLE_INDEXING_SA_KEY: ${{ secrets.GOOGLE_INDEXING_SA_KEY }}
        run: node scripts/gsc-verify-sa.mjs token

      - name: Build + deploy to /docs (publishes the token file)
        env:
          PUBLIC_ADSENSE_ID: ca-pub-1426577294682977
          PUBLIC_GA4_ID: G-YVKK4MXGVP
          PUBLIC_GSC_VERIFICATION: CvVq2ULyJsWJwR6FRFS9VAH45TO2nuQQ3YF9sL9tRyE
          PUBLIC_LEAD_ENDPOINT: https://api.web3forms.com/submit
          PUBLIC_WEB3FORMS_KEY: a60d7acf-608e-455d-b6c0-5266f3b7dc5e
          PUBLIC_ADSENSE_SLOT_ARTICLE_TOP: '7717297356'
          PUBLIC_ADSENSE_SLOT_ARTICLE_END: '3778052348'
          PUBLIC_ADSENSE_SLOT_MONEY_FOOTER: '4109224835'
          PUBLIC_ADSENSE_SLOT_THANKYOU: '1151889001'
        run: bash scripts/deploy-to-docs.sh

      - name: Commit & push the token file + deploy
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public docs
          git commit -m "Activate Indexing API: publish SA verification token (${{ steps.token.outputs.token_file }})"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push attempt $i failed (likely a concurrent push) — retrying"
            sleep 5
          done
          echo "::error::Could not push after 5 attempts"
          exit 1

      - name: Verify service-account ownership (waits for the live file)
        env:
          GOOGLE_INDEXING_SA_KEY: ${{ secrets.GOOGLE_INDEXING_SA_KEY }}
        run: node scripts/gsc-verify-sa.mjs verify

      - name: Confirm Indexing API now authorizes (expect URL_UPDATED)
        env:
          GOOGLE_INDEXING_SA_KEY: ${{ secrets.GOOGLE_INDEXING_SA_KEY }}
        run: node scripts/google-index.mjs --article how-to-build-credit-with-itin
