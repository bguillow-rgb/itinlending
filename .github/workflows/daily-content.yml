name: Daily SEO content

# Generates one research-backed, schema-compliant article per day, rebuilds the
# site into /docs (GitHub Pages), commits, pushes, and pings IndexNow.
# Manual runs are allowed via the "Run workflow" button.
on:
  schedule:
    - cron: '0 13 * * *' # 13:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-content
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate today's article
        id: write
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/daily-post.mjs

      # Fill any missing es-419 translations and refresh the relatedSlugs mesh.
      # Runs every day so existing articles get translated and the internal-link
      # mesh stays complete even on days no new article is published. Skips
      # articles that already have a translation (no --force), so it's cheap.
      - name: Backfill ES translations + relink
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/backfill.mjs

      # Commit if EITHER a new article was written OR the backfill changed any
      # content (new translations, relinked siblings).
      - name: Detect content changes
        id: changes
        working-directory: .
        run: |
          if [ "${{ steps.write.outputs.wrote }}" = "true" ] || \
             ! git diff --quiet -- web/src/content; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + deploy to /docs
        if: steps.changes.outputs.changed == 'true'
        # The build bakes PUBLIC_* vars into the static HTML. .env is gitignored
        # and absent in CI, so without these the rebuilt /docs would lose AdSense
        # + GA4. All values below are public identifiers already shipped in the
        # site's HTML (not secrets), so they live here as literals.
        env:
          PUBLIC_ADSENSE_ID: ca-pub-1426577294682977
          PUBLIC_GA4_ID: G-YVKK4MXGVP
          PUBLIC_LEAD_ENDPOINT: https://api.web3forms.com/submit
          PUBLIC_WEB3FORMS_KEY: a60d7acf-608e-455d-b6c0-5266f3b7dc5e
          PUBLIC_ADSENSE_SLOT_ARTICLE_TOP: '7717297356'
          PUBLIC_ADSENSE_SLOT_ARTICLE_END: '3778052348'
          PUBLIC_ADSENSE_SLOT_MONEY_FOOTER: '4109224835'
          PUBLIC_ADSENSE_SLOT_THANKYOU: '1151889001'
        run: bash scripts/deploy-to-docs.sh

      - name: Ping IndexNow
        if: steps.changes.outputs.changed == 'true'
        run: node scripts/indexnow.mjs || true

      # Push the new article straight to Google's Indexing API so it gets spidered
      # ASAP instead of waiting for sitemap rediscovery. Only fires when a NEW
      # article was written today (not on es-backfill-only days). No-ops cleanly
      # until GOOGLE_INDEXING_SA_KEY is set. See scripts/google-index.mjs for the
      # service-account / owner-verification requirements + policy caveat.
      - name: Ping Google Indexing API
        if: steps.write.outputs.slug != ''
        env:
          GOOGLE_INDEXING_SA_KEY: ${{ secrets.GOOGLE_INDEXING_SA_KEY }}
        run: node scripts/google-index.mjs --article "${{ steps.write.outputs.slug }}" || true

      - name: Commit & push
        if: steps.changes.outputs.changed == 'true'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs web/src/content
          git commit -m "Daily content: ${{ steps.write.outputs.slug || 'es backfill + relink' }}"
          # These repos get concurrent pushes (parallel sessions), so rebase and
          # retry to survive non-fast-forward rejections.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push attempt $i failed (likely a concurrent push) — retrying"
            sleep 5
          done
          echo "::error::Could not push after 5 attempts"
          exit 1
