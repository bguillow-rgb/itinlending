# Supabase config for the ITIN Lead Intelligence backend.
project_id = "itin-lead-intelligence"

# The lead intake endpoint must be PUBLIC (the marketing sites' forms POST to it
# with no auth). verify_jwt = false disables Supabase's JWT gate for this function.
[functions.lead]
verify_jwt = false

# The dashboard SPA is public HTML; data is protected by an access code inside
# the function (service role never reaches the browser).
[functions.dashboard]
verify_jwt = false
